version: 2.1

orbs:
  shellcheck: circleci/shellcheck@3.4.0

executors:
  releaser:
    docker:
      - image: circleci/cli-releaser:0.3.0

commands:
  install-deps:
    description: "Install Node dependencies with caching"
    steps:
      - restore_cache:
          keys:
            - deps-v2-{{ checksum "bun.lock" }}
            - deps-v2-
      - run:
          name: Install dependencies
          command: bun install --frozen-lockfile
      - save_cache:
          key: deps-v2-{{ checksum "bun.lock" }}
          paths:
            - node_modules
            - packages/hook/node_modules

jobs:
  lint:
    executor: releaser
    resource_class: small
    steps:
      - checkout
      - install-deps
      - run:
          name: Lint
          command: bun run lint
          no_output_timeout: 60s

  typecheck:
    executor: releaser
    resource_class: small
    steps:
      - checkout
      - install-deps
      - run:
          name: Type check
          command: bun run typecheck
          no_output_timeout: 60s

  test:
    executor: releaser
    resource_class: medium
    steps:
      - checkout
      - install-deps
      - run:
          name: Run unit tests
          command: bun run test:unit
          no_output_timeout: 90s

  test-hook:
    executor: releaser
    resource_class: medium
    steps:
      - checkout
      - install-deps
      - run:
          name: Run hook package tests
          command: bun test packages/hook/src/__tests__
          no_output_timeout: 90s

workflows:
  ci:
    jobs:
      - shellcheck/check
      - lint
      - typecheck
      - test:
          context:
            - chunk-cli-test
          requires:
            - shellcheck/check
      - test-hook:
          requires:
            - shellcheck/check
