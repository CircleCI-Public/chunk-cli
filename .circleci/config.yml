version: 2.1

orbs:
  shellcheck: circleci/shellcheck@3.4.0
  go: circleci/go@3.0.4

jobs:
  lint:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - go/with-cache:
          key: lint
          mod: true
          steps:
            - run:
                name: Run golangci-lint
                command: golangci-lint run ./...

  test:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - go/with-cache:
          key: test
          mod: true
          steps:
            - run:
                name: Run tests
                command: go test -race ./...
                no_output_timeout: 90s

  acceptance-test:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - go/with-cache:
          key: acceptance
          checksum: '{{ checksum "acceptance/go.sum" }}'
          mod: true
          steps:
            - run:
                name: Run acceptance tests
                command: cd acceptance && go test -v -count=1 -race ./...
                no_output_timeout: 120s

  build-smoke-test:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - go/with-cache:
          key: build
          mod: true
          steps:
            - run:
                name: Build binary
                command: go build -o dist/chunk ./cmd/chunk
            - run:
                name: Verify skill content is embedded
                command: |
                  mkdir -p ~/.claude
                  ./dist/chunk skills install
                  echo "OK: skill content embedded correctly"
                  head -5 ~/.claude/skills/chunk-review/SKILL.md

workflows:
  ci:
    jobs:
      - shellcheck/check
      - lint
      - test:
          context:
            - chunk-cli-test
          requires:
            - shellcheck/check
            - lint
      - acceptance-test:
          context:
            - chunk-cli-test
          requires:
            - shellcheck/check
            - lint
      - build-smoke-test:
          requires:
            - shellcheck/check
            - lint
