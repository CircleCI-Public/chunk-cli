version: 2.1

orbs:
  shellcheck: circleci/shellcheck@3.4.0

executors:
  releaser:
    docker:
      - image: circleci/cli-releaser:0.3.0

commands:
  install-deps:
    description: "Install Node dependencies with caching"
    steps:
      - restore_cache:
          keys:
            - deps-v3-{{ checksum "bun.lock" }}
      - run:
          name: Install dependencies
          command: bun install --frozen-lockfile
      - save_cache:
          key: deps-v3-{{ checksum "bun.lock" }}
          paths:
            - node_modules

jobs:
  lint:
    executor: releaser
    resource_class: medium
    steps:
      - checkout
      - install-deps
      - run: bun run lint
      - run: bun run typecheck

  test:
    executor: releaser
    resource_class: medium
    steps:
      - checkout
      - install-deps
      - run:
          name: Run tests
          command: bun test
          no_output_timeout: 90s

  build-smoke-test:
    executor: releaser
    resource_class: medium
    steps:
      - checkout
      - install-deps
      - run:
          name: Build linux binary
          command: bun run build:linux-x64
      - run:
          name: Verify skill content is embedded (not a bunfs path)
          command: |
            mkdir -p ~/.claude
            ./dist/chunk-linux-x64 skills install
            if grep -qF '/$bunfs/' ~/.claude/skills/chunk-review/SKILL.md; then
              echo "ERROR: SKILL.md contains a bunfs path — --loader .md:text was not applied"
              cat ~/.claude/skills/chunk-review/SKILL.md
              exit 1
            fi
            echo "OK: skill content embedded correctly"
            head -5 ~/.claude/skills/chunk-review/SKILL.md

workflows:
  ci:
    jobs:
      - shellcheck/check
      - lint
      - test:
          context:
            - chunk-cli-test
          requires:
            - shellcheck/check
            - lint
      - build-smoke-test:
          requires:
            - shellcheck/check
            - lint
