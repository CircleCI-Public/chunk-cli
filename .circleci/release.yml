version: 2.1

parameters:
  version:
    type: string
    default: ""
    description: "Version to release (e.g. 1.2.3). Omit to auto-increment patch."

jobs:
  release:
    docker:
      - image: cimg/go:1.26
    resource_class: medium
    steps:
      - checkout
      - run:
          name: Install goreleaser
          command: go install github.com/goreleaser/goreleaser/v2@latest
      - run:
          name: Install task
          command: go install github.com/go-task/task/v3/cmd/task@latest
      - run: task release VERSION=<< pipeline.parameters.version >>

  test-homebrew-install:
    macos:
      xcode: "26.3.0"
    resource_class: m4pro.medium
    steps:
      - run:
          name: Install chunk via Homebrew
          command: brew install CircleCI-Public/circleci/chunk
      - run:
          name: Verify installation
          command: chunk --version

workflows:
  release:
    jobs:
      - release:
          context:
            - chunk-cli-deploy
      - test-homebrew-install
