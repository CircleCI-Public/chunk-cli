version: 2.1

parameters:
  version:
    type: string
    default: ""
    description: "Version to release (e.g. 1.2.3). Omit to auto-increment patch."

executors:
  releaser:
    docker:
      - image: circleci/cli-releaser:0.3.0

commands:
  install-deps:
    description: "Install Node dependencies with caching"
    steps:
      - restore_cache:
          keys:
            - deps-v1-{{ checksum "bun.lock" }}
            - deps-v1-
      - run:
          name: Install dependencies
          command: bun install --frozen-lockfile
      - save_cache:
          key: deps-v1-{{ checksum "bun.lock" }}
          paths:
            - node_modules

jobs:
  release:
    executor: releaser
    resource_class: medium
    steps:
      - checkout
      - install-deps

      - run: task release VERSION=<< pipeline.parameters.version >>

workflows:
  release:
    jobs:
      - release:
          context:
            - chunk-cli-deploy
