# .chunk/hook/config.yml — Per-repo configuration for chunk hook.
#
# Place this file at `.chunk/hook/config.yml` in your project root.
# Edit the `command:` fields below to match your repo's tooling.

# --- Named trigger groups ---
triggers:
  pre-commit:
    - "git commit"
    - "git push"

# --- Exec definitions ---
execs:
  tests:
    command: "task test"
    fileExt: ".go"
    always: false
    timeout: 300
    limit: 3

  tests-changed:
    command: "task test"
    fileExt: ".go"
    always: false
    timeout: 300
    limit: 3

  lint:
    command: "task lint"
    always: false
    timeout: 60
    limit: 3

  format:
    command: "task fmt"
    always: true
    timeout: 30
    limit: 3
